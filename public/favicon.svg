<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <defs>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#C9963A" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#C9963A" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9963A" stop-opacity="0.9" />
            <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#C9963A" stop-opacity="0.4" />
        </linearGradient>

        <linearGradient id="slashGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#B8860B" />
            <stop offset="50%" stop-color="#FDE047" />
            <stop offset="100%" stop-color="#C9963A" />
        </linearGradient>

        <filter id="slashGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect x="2" y="2" width="28" height="28" rx="8" fill="#0A0A0A" />
    <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#bgGlow)" />
    <rect x="2" y="2" width="28" height="28" rx="8" fill="none" stroke="url(#borderGrad)" stroke-width="1.2" />

    <polyline points="12 10 7 16 12 22" fill="none" stroke="#F4F4F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="20 10 25 16 20 22" fill="none" stroke="#F4F4F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="18" y1="7" x2="14" y2="25" fill="none" stroke="url(#slashGrad)" stroke-width="3" stroke-linecap="round" filter="url(#slashGlow)" />
</svg>
